<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>To-DoX Cast Receiver</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100vh; background: #030513; overflow: hidden; }

    #frame {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    #splash {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #030513;
      gap: 24px;
      transition: opacity 0.4s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }

    .splash-title {
      font-family: sans-serif;
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 0.3em;
      background: linear-gradient(to right, #06b6d4, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .splash-sub {
      font-family: sans-serif;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.15em;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #06b6d4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Splash screen while loading -->
  <div id="splash">
    <div class="splash-title">TO DO X</div>
    <div class="spinner"></div>
    <div class="splash-sub">En attente de connexion…</div>
  </div>

  <!-- The app loads here -->
  <iframe id="frame"></iframe>

  <!-- Cast Application Framework v3 Receiver SDK -->
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script>
    const splash = document.getElementById('splash');
    const frame  = document.getElementById('frame');

    function loadUrl(url) {
      if (!url) return;
      frame.src = url;
      // Hide splash once iframe has loaded
      frame.onload = () => splash.classList.add('hidden');
      // Safety: hide splash after 4s anyway
      setTimeout(() => splash.classList.add('hidden'), 4000);
    }

    // ── Cast Receiver SDK ──────────────────────────────────────────────────
    try {
      const ctx = cast.framework.CastReceiverContext.getInstance();

      // Intercept LOAD messages — instead of playing media, load the URL in an iframe
      ctx.getPlayerManager().setMessageInterceptor(
        cast.framework.messages.MessageType.LOAD,
        (request) => {
          const url = request && request.media && request.media.contentId;
          loadUrl(url);
          return null; // Suppress default media player behavior
        }
      );

      ctx.start({ disableIdleTimeout: true, maxInactivity: 3600 });
    } catch (e) {
      console.warn('[RECEIVER] Cast SDK unavailable:', e.message);
    }

    // ── Fallback: URL passed as query string (?url=...) ───────────────────
    // Useful when Cast SDK is not available (e.g. navigated directly)
    try {
      const params = new URLSearchParams(window.location.search);
      const fallback = params.get('url');
      if (fallback) loadUrl(decodeURIComponent(fallback));
    } catch (e) { /* ignore */ }
  </script>
</body>
</html>
